{{ define "main" }}
  <main id="top">
    <section class="section reveal">
      <div class="section-heading">
        <p class="eyebrow">Cases</p>
        <h1>{{ .Title }}</h1>
        <p class="case-summary">{{ .Params.summary }}</p>
      </div>

      <div class="project-grid">
        {{ range .Pages.ByWeight }}
          {{ $case := .Params.case }}
          <a class="project-card-link" href="{{ .RelPermalink }}">
            <article class="project-card">
              <p class="project-index">{{ $case.index }}</p>
              <h3>{{ .Title }}</h3>
              <p>{{ .Description }}</p>
              <p class="project-stack">{{ $case.stack }}</p>
              <ul class="project-results">
                {{ range $case.results }}
                  <li>{{ . }}</li>
                {{ end }}
              </ul>
              <span class="project-cta">Ler case</span>
            </article>
          </a>
        {{ end }}
      </div>
    </section>
  </main>
{{ end }}
